<!DOCTYPE html>
<html>
<head>
    <title>MedAI Generator</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #e2e8f0; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 320px; }
        h2 { margin-top: 0; color: #1e293b; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; }
        button { background: #2563eb; color: white; border: none; padding: 14px 20px; border-radius: 8px; font-size: 16px; cursor: pointer; transition: 0.2s; width: 100%; font-weight: bold; margin-top: 10px; }
        button:hover { background: #1d4ed8; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(37,99,235,0.3); }
        #status { color: #64748b; font-size: 13px; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>🏥 MedAI Generator</h2>
        <p style="color: #64748b; font-size: 14px;">User-Facing Frontend Demo</p>
        
        <input type="text" id="name" value="Ashok" placeholder="Patient Name">
        <input type="number" id="age" value="22" placeholder="Age">
        
        <button onclick="downloadPDF()" id="btn">✨ Get My Report ✨</button>
        <p id="status">Ready.</p>
    </div>

    <script>
        async function downloadPDF() {
            const btn = document.getElementById('btn');
            const status = document.getElementById('status');
            const name = document.getElementById('name').value;
            const age = parseInt(document.getElementById('age').value);

            btn.innerText = "⏳ Generating...";
            status.innerText = "Talking to Member 5's API...";

            // This perfectly matches your schema.json!
            const requestData = {
                patient_name: name,
                age: age,
                symptoms: ["Fatigue", "Brain fog", "Stress from Engineering"],
                prediction: "Needs a nap and some anime"
            };

            try {
                // Hitting YOUR backend
                const response = await fetch("http://127.0.0.1:8000/generate-pdf", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(requestData)
                });

                if (!response.ok) throw new Error("Backend rejected the JSON format.");

                // The magic download trick
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `Medical_Report_${name}.pdf`; // The file name the user sees
                document.body.appendChild(a);
                a.click();
                
                btn.innerText = "✨ Get My Report ✨";
                status.innerText = "✅ Success! Check your downloads folder.";
            } catch (error) {
                btn.innerText = "❌ Failed";
                status.innerText = "Error: Is your FastAPI server running?";
            }
        }
    </script>

</body>
</html>
